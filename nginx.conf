# ============================================================
# PT Media Observatory — Nginx Configuration (Sprint 0)
# ============================================================
# Serves static React build and reverse-proxies API to backend.
# Sprint 0: HTTP only (port 80). SSL terminates at a later sprint
# when this gets deployed behind a load balancer or cert-manager.
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # === Logging ===
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # === Performance ===
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # === Security headers (Sprint 0 — relaxed for dev) ===
    # Will be hardened in Sprint 3 with CSP and HSTS.

    # --------------------------------------------------------
    # Upstream: FastAPI backend
    # --------------------------------------------------------
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # --------------------------------------------------------
    # Main server block
    # --------------------------------------------------------
    server {
        listen 80;
        server_name _;

        client_max_body_size 10M;

        # --- Security headers (baseline) ---
        add_header X-Content-Type-Options  "nosniff" always;
        add_header X-Frame-Options         "DENY" always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

        # --- Gzip compression ---
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript
                   application/json application/javascript application/xml+rss
                   application/atom+xml image/svg+xml;

        # ----------------------------------------------------
        # API — reverse proxy to FastAPI backend
        # ----------------------------------------------------
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header Connection         "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            # Strip /api prefix before forwarding to FastAPI
            # (FastAPI routes are /submissions, /events, etc.)
            rewrite ^/api/(.*) /$1 break;
        }

        # --- Public API docs ---
        location /docs {
            proxy_pass http://backend/docs;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
        }

        location /openapi.json {
            proxy_pass http://backend/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
        }

        # --- Health check (no proxy, no logging) ---
        location /health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # ----------------------------------------------------
        # Static files — React SPA
        # ----------------------------------------------------
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;

            # Cache hashed assets for 1 year
            location ~* \.(?:css|js|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ----------------------------------------------------
        # Deny access to hidden files
        # ----------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}