version: '3.9'

services:
  # PostgreSQL database with persistence
  db:
    image: postgres:16-alpine
    container_name: ptmedia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-examplepassword}
      POSTGRES_DB: ${POSTGRES_DB:-ptmedia}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis with persistence
  redis:
    image: redis:7-alpine
    container_name: ptmedia-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ptmedia-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:${REDIS_PORT:-6379}/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-key}
      - CELERY_BROKER_URL=redis://redis:${REDIS_PORT:-6379}/0
      - CELERY_RESULT_BACKEND=redis://redis:${REDIS_PORT:-6379}/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery worker for async tasks
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ptmedia-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:${REDIS_PORT:-6379}/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-key}
      - CELERY_BROKER_URL=redis://redis:${REDIS_PORT:-6379}/0
      - CELERY_RESULT_BACKEND=redis://redis:${REDIS_PORT:-6379}/0
    depends_on:
      - backend
      - redis
      - db
    volumes:
      - ./backend/app:/app/app
    command: celery -A app.tasks.celery_app worker --loglevel=info

  # Nginx reverse proxy with SSL termination, static file serving, rate limiting
  nginx:
    image: nginx:1.27-alpine
    container_name: ptmedia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./certs:/etc/ssl/certs:ro
    environment:
      - SSL_CERT_PATH=/etc/ssl/certs/fullchain.pem
      - SSL_KEY_PATH=/etc/ssl/certs/privkey.pem
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata: