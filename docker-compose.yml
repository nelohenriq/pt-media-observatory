services:
  # PostgreSQL database with persistence
  db:
    image: postgres:16-alpine
    container_name: ptmedia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-examplepassword}
      POSTGRES_DB: ${POSTGRES_DB:-ptmedia}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ptmedia-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-examplepassword}@db:5432/${POSTGRES_DB:-ptmedia}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app:ro
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3

  # React frontend (built in Docker)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ptmedia-frontend
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:80/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  # Nginx reverse proxy: serves frontend static files + proxies /api to backend
  nginx:
    image: nginx:1.27-alpine
    container_name: ptmedia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/ssl/certs:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:80/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata: